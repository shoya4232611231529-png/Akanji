<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>漢字メモ＆テスト - 極</title>
    <!-- アイコンフォントとGoogleフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f5f4f0; /* 落ち着いた和モダンな薄いベージュ */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent-color: #2c3e50; /* 高級感のある藍鉄色 */
            --primary-blue: #34495e;
            --border-color: #e2dfd8;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            --transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 10px;
            line-height: 1.5;
            overflow-x: hidden;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        /* ヘッダーデザインのコンパクト化 */
        header {
            text-align: center;
            margin-bottom: 15px;
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        header h1 i {
            font-size: 1.2rem;
            color: #d35400; /* 朱色 */
        }

        /* ナビゲーションタブ */
        .tabs {
            display: flex;
            background: #e8e5dc;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 15px;
            gap: 4px;
            position: relative;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: #7f8c8d;
            border-radius: 25px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab.active {
            background: var(--card-bg);
            color: var(--accent-color);
            font-weight: 700;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        .panel {
            display: none;
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* カードの共通デザイン */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            transition: var(--transition);
            position: relative;
        }

        /* 漢字テスト UIのスクロール不要調整 */
        .quiz-start-screen {
            text-align: center;
            padding: 30px 10px;
        }

        .quiz-start-screen i {
            font-size: 3.5rem;
            color: #d35400;
            margin-bottom: 15px;
        }

        .quiz-start-screen h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .quiz-start-screen p {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        /* テスト中のコンテナ配置 */
        .quiz-kanji-container {
            text-align: center;
            padding: 15px 0;
            border-bottom: 1px dashed var(--border-color);
            margin-bottom: 15px;
        }

        .quiz-kanji {
            font-size: 3.8rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 4px;
        }

        /* プログレスバー */
        .progress-container {
            width: 100%;
            height: 5px;
            background-color: #e8e5dc;
            border-radius: 3px;
            margin-bottom: 12px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #34495e, #d35400);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 答えエリア（漢字の真下） */
        .quiz-details {
            display: none;
            padding-bottom: 10px;
            animation: fadeIn 0.25s ease;
        }

        .detail-group {
            margin-bottom: 12px;
        }

        .detail-group .label {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 700;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detail-group .value {
            font-size: 0.95rem;
            color: var(--text-main);
        }

        .reading-highlight {
            font-size: 1.4rem !important;
            font-weight: 700;
            color: #d35400;
        }

        /* 意味リスト形式 */
        .meaning-list {
            list-style: none;
        }

        .meaning-list li {
            position: relative;
            padding-left: 18px;
            margin-bottom: 4px;
            font-size: 0.9rem;
        }

        .meaning-list li::before {
            content: "•";
            color: #d35400;
            font-size: 1.2rem;
            position: absolute;
            left: 4px;
            top: -2px;
        }

        /* ボタンデザインの最適化 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: #1a252f;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-outline-danger {
            background: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            width: auto;
            font-weight: bold;
        }

        /* アクションボタン（覚えた・覚えてない）を漢字の真下に隙間なく配置 */
        .quiz-actions {
            display: none;
            gap: 12px;
            margin-top: 10px;
        }

        /* 漢字登録アコーディオン（超縮小） */
        .register-accordion-header {
            background: #e8e5dc;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--accent-color);
            transition: var(--transition);
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
        }

        .register-accordion-header:hover {
            background: #dfdbd0;
        }

        .register-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .register-accordion-content.open {
            max-height: 800px; /* 十分な高さ */
            margin-bottom: 15px;
        }

        /* 漢字登録フォーム内の余白削減 */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .form-control {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.9rem;
            transition: var(--transition);
            background: #fafaf9;
        }

        .form-control:focus {
            outline: none;
            border-color: #d35400;
            background: #ffffff;
        }

        /* 自動検知中ローダー */
        .loading-text {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #d35400;
            margin-top: 4px;
            font-weight: bold;
        }

        .loading-text i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* アコーディオン式 漢字メモ一覧 */
        .list-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0 10px;
        }

        .list-section-title {
            font-size: 1.05rem;
            color: var(--accent-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-reset-all {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-reset-all:hover {
            background: #e8e5dc;
        }

        .kanji-list-item {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 8px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: var(--transition);
        }

        .kanji-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            cursor: pointer;
        }

        .kanji-text {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .kanji-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 700;
        }

        .badge-red { background: #fee2e2; color: var(--danger-color); }
        .badge-green { background: #d1fae5; color: var(--success-color); }

        .chevron-icon {
            color: var(--text-sub);
            transition: transform 0.2s ease;
            font-size: 0.8rem;
        }

        /* アコーディオン開閉 */
        .kanji-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: #fafaf9;
        }

        .kanji-list-item.open .kanji-body {
            max-height: 500px;
            border-top: 1px solid var(--border-color);
        }

        .kanji-list-item.open .chevron-icon {
            transform: rotate(180deg);
        }

        .kanji-body-content {
            padding: 15px;
        }

        .kanji-body-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px dashed var(--border-color);
        }

        .btn-status {
            background: none;
            border: 1px solid var(--border-color);
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--text-main);
            transition: var(--transition);
        }

        /* オリジナル トースト通知 */
        .toast-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.85rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-container.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 確認用モーダル */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            border-radius: 16px;
            width: 85%;
            max-width: 340px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(20px);
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
        }

        .modal-overlay.show .modal-card {
            transform: translateY(0);
        }

        .modal-card h3 {
            font-size: 1.1rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .modal-card p {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn {
            padding: 10px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-feather-pointed"></i> 漢字メモ ＆ テスト</h1>
    </header>

    <!-- ナビゲーションタブ -->
    <div class="tabs">
        <div id="tab-quiz" class="tab active" onclick="switchTab('quiz')">
            <i class="fa-solid fa-graduation-cap"></i> 漢字テスト
        </div>
        <div id="tab-memo" class="tab" onclick="switchTab('memo')">
            <i class="fa-solid fa-list-ul"></i> 漢字メモ一覧
        </div>
    </div>

    <!-- パネル1：漢字テスト -->
    <div id="quiz-panel" class="panel active">
        <div id="quiz-container" class="card">
            <!-- JavaScriptでスクロール不要なテスト画面がここに動的構築される -->
        </div>
    </div>

    <!-- パネル2：漢字メモ一覧 -->
    <div id="memo-panel" class="panel">
        
        <!-- 【超縮小】新しい漢字登録用アコーディオン -->
        <div class="register-accordion-header" onclick="toggleRegisterForm()">
            <span><i class="fa-solid fa-plus-circle" style="color: #d35400; margin-right: 6px;"></i> 新しい漢字を登録する</span>
            <i id="register-accordion-icon" class="fa-solid fa-chevron-down"></i>
        </div>
        
        <div id="register-form-container" class="register-accordion-content">
            <div class="card" style="margin-bottom: 0;">
                <form id="kanji-form" onsubmit="addKanji(event)">
                    <div class="form-group">
                        <label>漢字</label>
                        <input type="text" id="form-kanji" class="form-control" required placeholder="例：稟議" oninput="handleKanjiInput()">
                        <div id="loading-indicator" class="loading-text">
                            <i class="fa-solid fa-circle-notch"></i> 自動取得中...
                        </div>
                    </div>
                    <div class="form-group">
                        <label>読み</label>
                        <input type="text" id="form-reading" class="form-control" required placeholder="自動入力されます">
                    </div>
                    <div class="form-group">
                        <label>意味 (3つの詳細説明に自動補完)</label>
                        <textarea id="form-meaning" class="form-control" rows="3" required placeholder="自動入力されます"></textarea>
                    </div>
                    <div class="form-group">
                        <label>例文</label>
                        <input type="text" id="form-example" class="form-control" placeholder="自動入力または入力してください">
                    </div>
                    <button type="submit" class="btn btn-primary" style="padding:10px;"><i class="fa-solid fa-save"></i> メモを登録する</button>
                </form>
            </div>
        </div>

        <!-- 一覧リストのヘッダー -->
        <div class="list-header-container">
            <div class="list-section-title">
                <i class="fa-solid fa-folder-open" style="color: #d35400;"></i> 登録した漢字
            </div>
            <button id="reset-all-btn" class="btn-reset-all" onclick="showResetConfirmation()">
                <i class="fa-solid fa-rotate"></i> すべて未習得に戻す
            </button>
        </div>
        
        <div id="kanji-list"></div>
    </div>
</div>

<!-- カスタム通知トースト -->
<div id="toast" class="toast-container">
    <i class="fa-solid fa-circle-info"></i>
    <span id="toast-message">メッセージ</span>
</div>

<!-- カスタム確認ダイアログモーダル -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modal-title">確認</h3>
        <p id="modal-message">本当に実行してもよろしいですか？</p>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal(false)">いいえ</button>
            <button id="modal-confirm-btn" class="btn btn-primary" style="background-color:var(--danger-color);" onclick="closeModal(true)">はい</button>
        </div>
    </div>
</div>

<script>
    // 各漢字に対して3個以上の意味を盛り込んだローカル辞書データ（超高速・オフライン補完用）
    const offlineDict = {
        "稟議": { 
            reading: "りんぎ", 
            meaning: "① 会議を開く手間を省くため、関係部署に書類を回して承認を得ること。\n② 組織において、決裁権を持つ上司の承認を仰ぐ一連の手続き。\n③ 担当者が起案し、各役職者へ順次合議を行うこと。", 
            example: "稟議書を作成して上司に提出する。" 
        },
        "補填": { 
            reading: "ほてん", 
            meaning: "① 不足している金額や物質を他のもので埋め合わせること。\n② 赤字や損失が生じた際に、それを補い埋める行為。\n③ 欠損が生じた領域に物量を追加して元の満ちた状態に戻すこと。", 
            example: "赤字を自己資金で補填する。" 
        },
        "脆弱": { 
            reading: "ぜいじゃく", 
            meaning: "① 構造や性質がもろく弱く、壊れやすい様子であること。\n② コンピュータシステムにおいて、安全上の欠陥や弱点が存在する状態。\n③ 体質やメンタル面において外部からの刺激に耐える力が乏しいこと。", 
            example: "このシステムのセキュリティは脆弱だ。" 
        },
        "忖度": { 
            reading: "そんたく", 
            meaning: "① 相手に直接聞くことなく、その心情やおしはかる思いを推し量ること。\n② 相手の隠された本当の意向や状況に先回りで配慮すること。\n③ 他人の気持ちや背後の意図を推測して行動を決めること。", 
            example: "取引先の意向を忖度した提案を行う。" 
        },
        "完璧": { 
            reading: "かんぺき", 
            meaning: "① 欠点が全く存在せず、非の打ち所がない極めて優れた状態。\n② 計画や成果物が当初の目標や仕様を完全に満たしている様子。\n③ 完璧を象徴する語源として「キズ一つない高価な宝の玉(璧)」を持ち帰ること。", 
            example: "彼女のプレゼンは完璧だった。" 
        },
        "蔓延": { 
            reading: "まんえん", 
            meaning: "① 感染症や好ましくない習慣、思想などが社会全体に広く伝播すること。\n② 植物のつるが四方に伸び広がるように、勢いが止まらずに拡散すること。\n③ 望ましくない事態が制御困難な規模で全域に行き渡ること。", 
            reading: "まんえん", 
            example: "感染症の蔓延を防止するためのルールを敷く。" 
        },
        "破綻": { 
            reading: "はたん", 
            meaning: "① 財政面や資金繰りが行き詰まり、事業や生活の維持ができなくなること。\n② 構築してきた人間関係や夫婦関係、交渉内容が完全に壊れること。\n③ 衣服や布地が破れ裂けること（語源）。", 
            example: "資金繰りがつかずに計画が破綻した。" 
        },
        "乖離": { 
            reading: "かいり", 
            meaning: "① 互いに深く結びついているべき事柄が、かけ離れて離れてしまうこと。\n② 理想と現実、数値と実態などの間に大きな溝やズレが生じること。\n③ 本来一致するはずの二つの事実関係が離れてバラバラになること。", 
            example: "理想と現実が著しく乖離している。" 
        },
        "恣意": { 
            reading: "しい", 
            meaning: "① 一度に全部ではなく、自分勝手な都合で解釈を組み立てること。\n② 論理的な根拠や客観的な規則がなく、自分勝手な考えで進めること。\n③ 他人の状況を考慮せず、自分の意のままに行動すること。", 
            example: "ルールを恣意的に運用してはならない。" 
        },
        "漸次": { 
            reading: "ぜんじ", 
            meaning: "① 一度にではなく、時間の経過とともにだんだんと変化すること。\n② 段階を追って次第に目的の方向へと移行していく様子。\n③ 急進的ではなく、ゆるやかにプロセスが進捗していくこと。", 
            example: "景気は漸次回復している傾向にある。" 
        },
        "遵守": { 
            reading: "じゅんしゅ", 
            meaning: "① 定められた法律、社会的な規則、合意事項を忠実に守ること。\n② 道徳や規律に反することなく、その枠組みを維持すること。\n③ 指示されたプロセスや手順を間違いなく実践し守り抜くこと。", 
            example: "社内規則を遵守することが求められる。" 
        },
        "貼付": { 
            reading: "ちょうふ", 
            meaning: "① 書類や指定の位置に領収書や写真、切手などをペタッとはりつけること。\n② 「てんぷ」と読まれることも多いが、正式には「ちょうふ」と呼ぶ。\n③ 絆創膏や医療用パッチなどを患部の皮膚に直接密着させて貼ること。", 
            example: "封筒に領収書をしっかりと貼付する。" 
        },
        "捏造": { 
            reading: "ねつぞう", 
            meaning: "① 全く事実ではない事柄を、さも真実であるかのように偽って作り上げること。\n② 実績や証言、アリバイ、統計などを不当に偽造・偽装すること。\n③ 人を陥れる目的や、自己の都合のために虚偽の情報を捏ね上げること。", 
            example: "無実の罪を着せるためにアリバイを捏造する。" 
        },
        "隠蔽": { 
            reading: "いんぺい", 
            meaning: "① 都合の悪い事実、罪、ミスなどを他人から見えないように覆い隠すこと。\n② 証拠資料の破棄や情報の意図的な遮断を行い、認知を阻害する行為。\n③ 意図を持って特定の事象を社会的に闇に葬り去ること。", 
            example: "組織的に不祥事を隠蔽しようとする試み。" 
        }
    };

    // 初期データ（LocalStorageが空のとき）
    const defaultData = [
        { id: 1, kanji: "稟議", reading: "りんぎ", meaning: "① 会議を開く手間を省くため、関係部署に書類を回して承認を得ること。\n② 組織において、決裁権を持つ上司の承認を仰ぐ一連の手続き。\n③ 担当者が起案し、各役職者へ順次合議を行うこと。", example: "稟議書を作成して上司に提出する。", isMastered: false },
        { id: 2, kanji: "補填", reading: "ほてん", meaning: "① 不足している金額や物質を他のもので埋め合わせること。\n② 赤字や損失が生じた際に、それを補い埋める行為。\n③ 欠損が生じた領域に物量を追加して元の満ちた状態に戻すこと。", example: "赤字を自己資金で補填する。", isMastered: false },
        { id: 3, kanji: "脆弱", reading: "ぜいじゃく", meaning: "① 構造や性質がもろく弱く、壊れやすい様子であること。\n② コンピュータシステムにおいて、安全上の欠陥や弱点が存在する状態。\n③ 体質やメンタル面において外部からの刺激に耐える力が乏しいこと。", example: "このシステムのセキュリティは脆弱だ。", isMastered: true }
    ];

    let kanjiData = JSON.parse(localStorage.getItem('kanjiData')) || defaultData;
    let activeQuizCards = [];
    let currentQuizIndex = 0;
    let quizState = 'start'; // 'start', 'active'
    let currentTab = 'quiz'; // スワイプの追跡用
    let inputTimeout = null;
    let pendingModalCallback = null;

    // データをローカルストレージに保存
    function saveToStorage() {
        localStorage.setItem('kanjiData', JSON.stringify(kanjiData));
    }

    // トースト通知（美しいフェードイン＆アウト）
    function showToast(message) {
        const toast = document.getElementById('toast');
        const toastMessage = document.getElementById('toast-message');
        toastMessage.textContent = message;
        toast.classList.add('show');
        
        setTimeout(() => {
            toast.classList.remove('show');
        }, 2500);
    }

    // カスタムダイアログ確認画面
    function showConfirmModal(title, message, callback) {
        document.getElementById('modal-title').textContent = title;
        document.getElementById('modal-message').textContent = message;
        pendingModalCallback = callback;
        document.getElementById('confirm-modal').classList.add('show');
    }

    function closeModal(result) {
        document.getElementById('confirm-modal').classList.remove('show');
        if (pendingModalCallback) {
            pendingModalCallback(result);
            pendingModalCallback = null;
        }
    }

    // タブスワイプ切り替えの処理
    let touchStartX = 0;
    let touchStartY = 0;

    document.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, {passive: true});

    document.addEventListener('touchend', e => {
        let touchEndX = e.changedTouches[0].clientX;
        let touchEndY = e.changedTouches[0].clientY;
        
        let diffX = touchEndX - touchStartX;
        let diffY = touchEndY - touchStartY;

        // 横スワイプ量が大きく、縦スワイプが少ない時のみタブ切り替え
        if (Math.abs(diffX) > 80 && Math.abs(diffY) < 50) {
            if (diffX < 0 && currentTab === 'quiz') {
                switchTab('memo');
            } else if (diffX > 0 && currentTab === 'memo') {
                switchTab('quiz');
            }
        }
    }, {passive: true});

    // タブ切り替え
    function switchTab(tabName) {
        currentTab = tabName;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

        if(tabName === 'quiz') {
            document.getElementById('tab-quiz').classList.add('active');
            document.getElementById('quiz-panel').classList.add('active');
            quizState = 'start';
            initQuiz();
        } else {
            document.getElementById('tab-memo').classList.add('active');
            document.getElementById('memo-panel').classList.add('active');
            renderList();
        }
    }

    // 登録アコーディオン（折りたたみ）のトグル
    function toggleRegisterForm() {
        const content = document.getElementById('register-form-container');
        const icon = document.getElementById('register-accordion-icon');
        
        if (content.classList.contains('open')) {
            content.classList.remove('open');
            icon.style.transform = 'rotate(0deg)';
        } else {
            content.classList.add('open');
            icon.style.transform = 'rotate(180deg)';
        }
    }

    function handleKanjiInput() {
        clearTimeout(inputTimeout);
        inputTimeout = setTimeout(() => {
            fetchKanjiInfoAutomatically();
        }, 800); // 打ち終わって0.8秒待って起動
    }

    async function fetchKanjiInfoAutomatically() {
        const kanji = document.getElementById('form-kanji').value.trim();
        if (!kanji) return;

        // すでに全項目手動入力されている場合は上書きしない
        const currentReading = document.getElementById('form-reading').value.trim();
        const currentMeaning = document.getElementById('form-meaning').value.trim();
        if (currentReading && currentMeaning) return;

        const loader = document.getElementById('loading-indicator');
        loader.style.display = 'flex';

        // 1. ローカルオフライン辞書で完全一致検索
        if (offlineDict[kanji]) {
            fillForm(offlineDict[kanji].reading, offlineDict[kanji].meaning, offlineDict[kanji].example);
            loader.style.display = 'none';
            showToast(`「${kanji}」情報を自動取得したで！`);
            return;
        }

        try {
            // 2. Wikipedia 日本語APIの簡易利用
            const wikiUrl = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(kanji)}`;
            const wikiRes = await fetch(wikiUrl);
            
            if (wikiRes.ok) {
                const wikiData = await wikiRes.json();
                const extract = wikiData.extract || "";

                if (extract) {
                    const readingMatch = extract.match(/(?:（|\()([ぁ-んァ-ヶー]+)(?:）|\))/);
                    let reading = readingMatch ? readingMatch[1] : '';

                    let meaningRaw = extract;
                    const definitionMatch = extract.match(/(?:とは、|は、|とは)(.+)/);
                    if (definitionMatch) {
                        meaningRaw = definitionMatch[1];
                    }
                    
                    const sentences = meaningRaw.split('。').filter(s => s.trim().length > 0);
                    let meaningStr = "";
                    
                    if (sentences.length >= 3) {
                        meaningStr = `① ${sentences[0]}。\n② ${sentences[1]}。\n③ ${sentences[2]}。`;
                    } else if (sentences.length === 2) {
                        meaningStr = `① ${sentences[0]}。\n② ${sentences[1]}。\n③ 「${kanji}」の使われ方や会話表現。`;
                    } else {
                        meaningStr = `① ${sentences[0]}。\n② 辞書検索に基づく主なニュアンス。\n③ 日常生活やニュースで活用される用例。`;
                    }

                    if (!reading) {
                        const jishoReading = await fetchReadingFromJisho(kanji);
                        if (jishoReading) reading = jishoReading;
                    }

                    fillForm(reading, meaningStr, `「${kanji}」を使ったより自然な表現をここに記述します。`);
                    loader.style.display = 'none';
                    showToast(`「${kanji}」の情報をWikipediaから自動取得！`);
                    return;
                }
            }

            // 3. Jisho APIの呼び出し（最終バックアップ）
            const jishoBackup = await fetchFromJishoAll(kanji);
            if (jishoBackup) {
                fillForm(jishoBackup.reading, jishoBackup.meaning, `「${kanji}」に関する情報。`);
                showToast(`「${kanji}」の情報を取得したで！`);
            } else {
                showToast("見つからへんかった。手動で読みと意味を打ち込んでな！");
            }

        } catch (error) {
            console.error("API Error: ", error);
        } finally {
            loader.style.display = 'none';
        }
    }

    async function fetchReadingFromJisho(word) {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://jisho.org/api/v1/search/words?keyword=' + word)}`);
            const json = await res.json();
            const jishoData = JSON.parse(json.contents);
            if (jishoData && jishoData.data && jishoData.data.length > 0) {
                return jishoData.data[0].japanese[0].reading || '';
            }
        } catch (e) { console.error(e); }
        return '';
    }

    async function fetchFromJishoAll(word) {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://jisho.org/api/v1/search/words?keyword=' + word)}`);
            const json = await res.json();
            const jishoData = JSON.parse(json.contents);
            if (jishoData && jishoData.data && jishoData.data.length > 0) {
                const entry = jishoData.data[0];
                const reading = entry.japanese[0].reading || '';
                const senses = entry.senses.slice(0, 3);
                
                let meaningText = "";
                senses.forEach((sense, index) => {
                    meaningText += `${String.fromCharCode(9312 + index)} (${sense.parts_of_speech.join(', ')}) ${sense.english_definitions.join(', ')}\n`;
                });
                
                if (senses.length < 3) {
                    meaningText += `② ウェブ検索に基づく定義情報を記載。\n③ 主なビジネスシーンなどで使う表現。`;
                }

                return { reading, meaning: meaningText };
            }
        } catch (e) { console.error(e); }
        return null;
    }

    function fillForm(reading, meaning, example) {
        document.getElementById('form-reading').value = reading || '';
        document.getElementById('form-meaning').value = meaning || '';
        document.getElementById('form-example').value = example || '';
    }

    // メモ登録
    function addKanji(e) {
        e.preventDefault();
        const newKanji = {
            id: Date.now(),
            kanji: document.getElementById('form-kanji').value.trim(),
            reading: document.getElementById('form-reading').value.trim(),
            meaning: document.getElementById('form-meaning').value.trim(),
            example: document.getElementById('form-example').value.trim() || "（例文なし）",
            isMastered: false
        };

        kanjiData.push(newKanji);
        saveToStorage();
        document.getElementById('kanji-form').reset();
        
        // 登録後に登録フォームをパッと閉じる（快適さ向上）
        toggleRegisterForm();
        renderList();
        
        showToast(`「${newKanji.kanji}」を登録したで！`);
    }

    // 意味の複数箇条書き表示フォーマット
    function formatMeaning(meaningText) {
        if (!meaningText) return '';
        const lines = meaningText.split('\n');
        let html = '<ul class="meaning-list">';
        lines.forEach(line => {
            if (line.trim().length > 0) {
                html += `<li>${line}</li>`;
            }
        });
        html += '</ul>';
        return html;
    }

    // 一覧の再描写
    function renderList() {
        const listContainer = document.getElementById('kanji-list');
        listContainer.innerHTML = '';

        if (kanjiData.length === 0) {
            listContainer.innerHTML = '<p style="text-align:center; color:var(--text-sub); padding:30px;">登録した漢字はありません。<br>「新しい漢字を登録する」をタップしてな！</p>';
            return;
        }

        [...kanjiData].reverse().forEach(item => {
            const itemElement = document.createElement('div');
            itemElement.className = 'kanji-list-item';
            
            itemElement.innerHTML = `
                <div class="kanji-header" onclick="toggleAccordion(this)">
                    <span class="kanji-text">${item.kanji}</span>
                    <div class="kanji-meta">
                        <span class="badge ${item.isMastered ? 'badge-green' : 'badge-red'}">
                            ${item.isMastered ? '覚えた' : '未習得'}
                        </span>
                        <i class="fa-solid fa-chevron-down chevron-icon"></i>
                    </div>
                </div>
                <div class="kanji-body">
                    <div class="kanji-body-content">
                        <div class="detail-group">
                            <div class="label"><i class="fa-solid fa-microphone"></i> 読み</div>
                            <div class="value" style="font-weight: 700; color: #d35400;">${item.reading}</div>
                        </div>
                        <div class="detail-group">
                            <div class="label"><i class="fa-solid fa-book"></i> 意味</div>
                            <div class="value">${formatMeaning(item.meaning)}</div>
                        </div>
                        <div class="detail-group">
                            <div class="label"><i class="fa-solid fa-pen-nib"></i> 例文</div>
                            <div class="value" style="font-style: italic; color: #555;">${item.example}</div>
                        </div>
                        <div class="kanji-body-footer">
                            <button class="btn-status" onclick="toggleStatus(${item.id})">
                                ${item.isMastered ? '<i class="fa-solid fa-xmark"></i> 未習得に戻す' : '<i class="fa-solid fa-check"></i> 覚えたにする'}
                            </button>
                            <button class="btn-outline-danger" onclick="confirmDelete(${item.id}, '${item.kanji}')">
                                <i class="fa-solid fa-trash-can"></i> 削除
                            </button>
                        </div>
                    </div>
                </div>
            `;
            listContainer.appendChild(itemElement);
        });
    }

    function toggleAccordion(headerElement) {
        const itemElement = headerElement.parentElement;
        const isOpen = itemElement.classList.contains('open');
        
        document.querySelectorAll('.kanji-list-item').forEach(item => {
            item.classList.remove('open');
        });

        if (!isOpen) {
            itemElement.classList.add('open');
        }
    }

    function toggleStatus(id) {
        kanjiData = kanjiData.map(item => item.id === id ? {...item, isMastered: !item.isMastered} : item);
        saveToStorage();
        renderList();
        showToast("習得ステータスを切り替えたよ！");
    }

    function showResetConfirmation() {
        showConfirmModal(
            "ステータスのリセット",
            "すべてを「未習得」に戻して、一から漢字テストをやり直しますか？",
            (confirmed) => {
                if (confirmed) {
                    kanjiData = kanjiData.map(item => ({...item, isMastered: false}));
                    saveToStorage();
                    renderList();
                    showToast("すべての漢字を未習得に戻したで！");
                }
            }
        );
    }

    function confirmDelete(id, kanjiName) {
        showConfirmModal(
            "漢字の削除",
            `「${kanjiName}」を完全にリストから削除しますか？`,
            (confirmed) => {
                if (confirmed) {
                    kanjiData = kanjiData.filter(item => item.id !== id);
                    saveToStorage();
                    renderList();
                    showToast(`「${kanjiName}」を削除したで。`);
                }
            }
        );
    }

    function initQuiz() {
        activeQuizCards = kanjiData.filter(item => !item.isMastered);
        renderQuiz();
    }

    function renderQuiz() {
        const container = document.getElementById('quiz-container');

        if (quizState === 'start') {
            if (activeQuizCards.length === 0) {
                container.innerHTML = `
                    <div class="quiz-start-screen">
                        <i class="fa-solid fa-face-laugh-beam" style="color: var(--success-color);"></i>
                        <h2>すべて完璧や！ 🎉</h2>
                        <p>現在、未習得の漢字はありません。<br>本をいっぱい読んでさらに追加してみてな！</p>
                        <button class="btn btn-primary" onclick="switchTab('memo')" style="width:auto; padding: 12px 24px;">新しい漢字を追加する</button>
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <div class="quiz-start-screen">
                        <i class="fa-solid fa-graduation-cap"></i>
                        <h2>漢字テストに挑戦</h2>
                        <p>覚えていない漢字が <strong>${activeQuizCards.length} 語</strong> あるよ！</p>
                        <button class="btn btn-primary" onclick="startQuizNow()" style="width:auto; padding: 14px 30px;"><i class="fa-solid fa-play"></i> テストを始める</button>
                    </div>
                `;
            }
        } else if (quizState === 'active') {
            renderActiveQuizCard();
        }
    }

    function startQuizNow() {
        quizState = 'active';
        currentQuizIndex = 0;
        renderQuiz();
    }

    // 漢字のすぐ下にすべてを集約したスクロール不要なカード描画
    function renderActiveQuizCard() {
        const container = document.getElementById('quiz-container');
        const currentCard = activeQuizCards[currentQuizIndex];
        
        const total = activeQuizCards.length;
        const progressPercentage = ((currentQuizIndex) / total) * 100;

        container.innerHTML = `
            <div style="display:flex; justify-content:space-between; color:var(--text-sub); font-size:0.8rem; margin-bottom:8px; font-weight:bold;">
                <span>問題: ${currentQuizIndex + 1} / ${total} 語目</span>
                <span style="color:#d35400;"><i class="fa-solid fa-hourglass-half"></i> 未マスター: ${total} 語</span>
            </div>

            <!-- 進捗ゲージ -->
            <div class="progress-container">
                <div class="progress-bar" style="width: ${progressPercentage}%"></div>
            </div>
            
            <!-- 漢字表示 -->
            <div class="quiz-kanji-container">
                <div class="quiz-kanji">${currentCard.kanji}</div>
            </div>
            
            <!-- 答えを見るボタン（回答時は非表示、親指位置） -->
            <button id="show-answer-btn" class="btn btn-primary" onclick="showQuizAnswer()"><i class="fa-solid fa-eye"></i> 答えを見る</button>
            
            <!-- 答え表示（漢字の真下） -->
            <div id="quiz-details" class="quiz-details">
                <div class="detail-group">
                    <div class="label"><i class="fa-solid fa-microphone"></i> 読み</div>
                    <div class="value reading-highlight">${currentCard.reading}</div>
                </div>
                <div class="detail-group" style="margin-bottom: 8px;">
                    <div class="label"><i class="fa-solid fa-book"></i> 意味</div>
                    <div class="value">${formatMeaning(currentCard.meaning)}</div>
                </div>
                <div class="detail-group" style="margin-bottom: 5px;">
                    <div class="label"><i class="fa-solid fa-pen-nib"></i> 例文</div>
                    <div class="value" style="font-style: italic; color:#555; font-size:0.85rem;">${currentCard.example}</div>
                </div>
            </div>

            <!-- 覚えた・覚えてないアクションボタン（完全に同じ目線に出現） -->
            <div id="quiz-actions" class="quiz-actions">
                <button class="btn btn-success" onclick="submitQuizResult(true)"><i class="fa-solid fa-check"></i> 覚えた！</button>
                <button class="btn btn-secondary" onclick="submitQuizResult(false)"><i class="fa-solid fa-rotate-right"></i> まだ…</button>
            </div>
        `;
    }

    function showQuizAnswer() {
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('quiz-details').style.display = 'block';
        document.getElementById('quiz-actions').style.display = 'flex';
    }

    function submitQuizResult(isMastered) {
        const currentCard = activeQuizCards[currentQuizIndex];

        if (isMastered) {
            kanjiData = kanjiData.map(item => item.id === currentCard.id ? {...item, isMastered: true} : item);
            saveToStorage();
            activeQuizCards.splice(currentQuizIndex, 1);
            showToast(`「${currentCard.kanji}」を覚えたよ！`);
        } else {
            currentQuizIndex++;
        }

        if (currentQuizIndex >= activeQuizCards.length) {
            currentQuizIndex = 0;
        }

        if (activeQuizCards.length === 0) {
            quizState = 'start';
        }

        renderQuiz();
    }

    // 初回起動
    initQuiz();
</script>

</body>
</html>
