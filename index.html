<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=no">
    <title>漢字メモ＆テスト - 極</title>
    <!-- アイコンフォントとGoogleフォントの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --bg-color: #f5f4f0; /* 落ち着いた和モダンな薄いベージュ */
            --card-bg: #ffffff;
            --text-main: #2c3e50;
            --text-sub: #7f8c8d;
            --accent-color: #2c3e50; /* 高級感のある藍鉄色 */
            --primary-blue: #34495e;
            --border-color: #e2dfd8;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --shadow: 0 8px 20px rgba(0, 0, 0, 0.04);
            --transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 15px 10px;
            line-height: 1.5;
            overflow-x: hidden;
            user-select: none;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 12px;
        }

        header h1 {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        header h1 i {
            font-size: 1.1rem;
            color: #d35400; /* 朱色 */
        }

        /* ナビゲーションタブ */
        .tabs {
            display: flex;
            background: #e8e5dc;
            border-radius: 30px;
            padding: 4px;
            margin-bottom: 15px;
            gap: 4px;
            position: relative;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9rem;
            color: #7f8c8d;
            border-radius: 25px;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .tab.active {
            background: var(--card-bg);
            color: var(--accent-color);
            font-weight: 700;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
        }

        /* */
        /* カルーセルスライド構造 */
        .swipe-container {
            width: 100%;
            overflow: hidden;
            position: relative;
        }

        .swipe-wrapper {
            display: flex;
            width: 200%; /* 2つのパネルを横並びにする */
            transition: var(--transition);
            will-change: transform;
        }

        .swipe-slide {
            width: 50%; /* 親要素が200%なので実質コンテナの100%幅 */
            box-sizing: border-box;
            padding: 0 4px;
        }

        /* 各種コンポーネントデザイン */
        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            box-shadow: var(--shadow);
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            position: relative;
        }

        /* 漢字テスト UI（スクロール不要設計） */
        .quiz-start-screen {
            text-align: center;
            padding: 30px 10px;
        }

        .quiz-start-screen i {
            font-size: 3.5rem;
            color: #d35400;
            margin-bottom: 15px;
        }

        .quiz-start-screen h2 {
            font-size: 1.3rem;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .quiz-start-screen p {
            color: var(--text-sub);
            font-size: 0.95rem;
            margin-bottom: 25px;
        }

        .quiz-kanji-container {
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px dashed var(--border-color);
            margin-bottom: 12px;
        }

        .quiz-kanji {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--accent-color);
            letter-spacing: 4px;
        }

        /* プログレスバー */
        .progress-container {
            width: 100%;
            height: 5px;
            background-color: #e8e5dc;
            border-radius: 3px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #34495e, #d35400);
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 答え表示エリア（完全に漢字の真下） */
        .quiz-details {
            display: none;
            padding-bottom: 10px;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .detail-group {
            margin-bottom: 8px;
        }

        .detail-group .label {
            font-size: 0.75rem;
            color: var(--text-sub);
            font-weight: 700;
            margin-bottom: 2px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .detail-group .value {
            font-size: 0.9rem;
            color: var(--text-main);
        }

        .reading-highlight {
            font-size: 1.3rem !important;
            font-weight: 700;
            color: #d35400;
        }

        .meaning-list {
            list-style: none;
        }

        .meaning-list li {
            position: relative;
            padding-left: 16px;
            margin-bottom: 2px;
            font-size: 0.85rem;
        }

        .meaning-list li::before {
            content: "•";
            color: #d35400;
            font-size: 1.1rem;
            position: absolute;
            left: 4px;
            top: -2px;
        }

        /* ボタンデザイン */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 11px;
            border: none;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.03);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn-primary {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
        }

        .btn-secondary {
            background-color: #95a5a6;
            color: white;
        }

        .btn-outline-danger {
            background: transparent;
            border: 1px solid var(--danger-color);
            color: var(--danger-color);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            width: auto;
            font-weight: bold;
        }

        /* 漢字の真下に隙間なく配置するテストボタン */
        .quiz-actions {
            display: none;
            gap: 10px;
            margin-top: 10px;
        }

        /* */
        /* 新規漢字登録（折りたたみアコーディオン） */
        .register-accordion-header {
            background: #e8e5dc;
            border-radius: 12px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--accent-color);
            transition: background 0.2s ease;
            margin-bottom: 10px;
            border: 1px solid var(--border-color);
        }

        .register-accordion-header:hover {
            background: #dfdbd0;
        }

        .register-accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .register-accordion-content.open {
            max-height: 800px;
            margin-bottom: 10px;
        }

        .form-group {
            margin-bottom: 10px;
        }

        .form-group label {
            display: block;
            margin-bottom: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .form-control {
            width: 100%;
            padding: 8px 12px;
            border: 1.5px solid var(--border-color);
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 0.85rem;
            transition: all 0.2s ease;
            background: #fafaf9;
        }

        .form-control:focus {
            outline: none;
            border-color: #d35400;
            background: #ffffff;
        }

        .loading-text {
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            color: #d35400;
            margin-top: 4px;
            font-weight: bold;
        }

        .loading-text i {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 漢字メモ一覧 */
        .list-header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0 8px;
        }

        .list-section-title {
            font-size: 0.95rem;
            color: var(--accent-color);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-reset-all {
            background: none;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-main);
            cursor: pointer;
            transition: background 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-reset-all:hover {
            background: #e8e5dc;
        }

        .kanji-list-item {
            background: var(--card-bg);
            border-radius: 12px;
            margin-bottom: 6px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: all 0.2s ease;
        }

        .kanji-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
        }

        .kanji-text {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--accent-color);
        }

        .kanji-meta {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .badge {
            padding: 3px 6px;
            border-radius: 10px;
            font-size: 0.65rem;
            font-weight: 700;
        }

        .badge-red { background: #fee2e2; color: var(--danger-color); }
        .badge-green { background: #d1fae5; color: var(--success-color); }

        .chevron-icon {
            color: var(--text-sub);
            transition: transform 0.2s ease;
            font-size: 0.75rem;
        }

        /* アコーディオン展開 */
        .kanji-body {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: #fafaf9;
        }

        .kanji-list-item.open .kanji-body {
            max-height: 500px;
            border-top: 1px solid var(--border-color);
        }

        .kanji-list-item.open .chevron-icon {
            transform: rotate(180deg);
        }

        .kanji-body-content {
            padding: 12px 16px;
        }

        .kanji-body-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            padding-top: 8px;
            border-top: 1px dashed var(--border-color);
        }

        .btn-status {
            background: none;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--text-main);
            transition: background 0.2s ease;
        }

        /* トースト通知 */
        .toast-container {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(44, 62, 80, 0.95);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 0.8rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
        }

        .toast-container.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* 確認用モーダル */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: white;
            border-radius: 16px;
            width: 85%;
            max-width: 320px;
            padding: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.12);
            transform: translateY(20px);
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: center;
        }

        .modal-overlay.show .modal-card {
            transform: translateY(0);
        }

        .modal-card h3 {
            font-size: 1.05rem;
            margin-bottom: 8px;
            color: var(--accent-color);
        }

        .modal-card p {
            color: var(--text-sub);
            font-size: 0.8rem;
            margin-bottom: 15px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-buttons .btn {
            padding: 9px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1><i class="fa-solid fa-feather-pointed"></i> 漢字メモ ＆ テスト</h1>
    </header>

    <!-- ナビゲーションタブ -->
    <div class="tabs">
        <div id="tab-quiz" class="tab active" onclick="switchTab(0)">
            <i class="fa-solid fa-graduation-cap"></i> 漢字テスト
        </div>
        <div id="tab-memo" class="tab" onclick="switchTab(1)">
            <i class="fa-solid fa-list-ul"></i> 漢字メモ一覧
        </div>
    </div>

    <!-- -->
    <!-- iPhoneホーム画面風のスワイプコンテナ -->
    <div class="swipe-container" id="swipe-container">
        <div id="swipe-wrapper" class="swipe-wrapper">
            
            <!-- スライド1：漢字テスト -->
            <div id="quiz-panel" class="swipe-slide">
                <div id="quiz-container" class="card">
                    <!-- JSでスクロール不要なテストが構築される -->
                </div>
            </div>

            <!-- スライド2：漢字メモ一覧 -->
            <div id="memo-panel" class="swipe-slide">
                
                <!-- 【超縮小】新しい漢字登録用アコーディオン -->
                <div class="register-accordion-header" onclick="toggleRegisterForm()">
                    <span><i class="fa-solid fa-plus-circle" style="color: #d35400; margin-right: 6px;"></i> 新しい漢字を登録する</span>
                    <i id="register-accordion-icon" class="fa-solid fa-chevron-down"></i>
                </div>
                
                <div id="register-form-container" class="register-accordion-content">
                    <div class="card" style="margin-bottom: 0;">
                        <form id="kanji-form" onsubmit="addKanji(event)">
                            <div class="form-group">
                                <label>漢字</label>
                                <input type="text" id="form-kanji" class="form-control" required placeholder="例：稟議" oninput="handleKanjiInput()">
                                <div id="loading-indicator" class="loading-text">
                                    <i class="fa-solid fa-circle-notch"></i> Webから例文や意味を自動取得中...
                                </div>
                            </div>
                            <div class="form-group">
                                <label>読み</label>
                                <input type="text" id="form-reading" class="form-control" required placeholder="自動入力されます">
                            </div>
                            <div class="form-group">
                                <label>意味 (詳細説明を3つ自動で表示)</label>
                                <textarea id="form-meaning" class="form-control" rows="3" required placeholder="自動入力されます"></textarea>
                            </div>
                            <div class="form-group">
                                <label>自動検索された例文</label>
                                <textarea id="form-example" class="form-control" rows="2" placeholder="自動入力されます。編集も可能です"></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary" style="padding:10px;"><i class="fa-solid fa-save"></i> メモを登録する</button>
                        </form>
                    </div>
                </div>

                <!-- 一覧リストのヘッダー -->
                <div class="list-header-container">
                    <div class="list-section-title">
                        <i class="fa-solid fa-folder-open" style="color: #d35400;"></i> 登録した漢字
                    </div>
                    <button id="reset-all-btn" class="btn-reset-all" onclick="showResetConfirmation()">
                        <i class="fa-solid fa-rotate"></i> すべて未習得に戻す
                    </button>
                </div>
                
                <div id="kanji-list"></div>
            </div>

        </div>
    </div>
</div>

<!-- カスタム通知トースト -->
<div id="toast" class="toast-container">
    <i class="fa-solid fa-circle-info"></i>
    <span id="toast-message">メッセージ</span>
</div>

<!-- カスタム確認ダイアログモーダル -->
<div id="confirm-modal" class="modal-overlay">
    <div class="modal-card">
        <h3 id="modal-title">確認</h3>
        <p id="modal-message">本当に実行してもよろしいですか？</p>
        <div class="modal-buttons">
            <button class="btn btn-secondary" onclick="closeModal(false)">いいえ</button>
            <button id="modal-confirm-btn" class="btn btn-primary" style="background-color:var(--danger-color);" onclick="closeModal(true)">はい</button>
        </div>
    </div>
</div>

<!-- -->
<script>
    // 各漢字に対して3個の意味、さらにガチ例文を完備したオフライン高速辞書（Web取得失敗時のフォールバック用）
    const offlineDict = {
        "稟議": { 
            reading: "りんぎ", 
            meaning: "① 会議を開く手間を省くため、関係部署に書類を回して承認を得ること。\n② 組織において、決裁権を持つ上司の承認を仰ぐ一連の手続き。\n③ 担当者が起案し、各役職者へ順次合議を行うこと。", 
            example: "予算を確保するため、稟議書を作成して役員会に提出した。" 
        },
        "補填": { 
            reading: "ほてん", 
            meaning: "① 不足している金額や物質を他のもので埋め合わせること。\n② 赤字や損失が生じた際に、それを補い埋める行為。\n③ 欠損が生じた領域に物量を追加して元の満ちた状態に戻すこと。", 
            example: "イベントの赤字分は、来期の予算から補填することになった。" 
        },
        "脆弱": { 
            reading: "ぜいじゃく", 
            meaning: "① 構造や性質がもろく弱く、壊れやすい様子であること。\n② コンピュータシステムにおいて、安全上の欠陥や弱点が存在する状態。\n③ 体質やメンタル面において外部からの刺激に耐える力が乏しいこと。", 
            example: "古いOSを使い続けると、脆弱性を突いたウイルス攻撃に遭う危険がある。" 
        },
        "忖度": { 
            reading: "そんたく", 
            meaning: "① 相手に直接聞くことなく、その心情やおしはかる思いを推し量ること。\n② 相手の隠された本当の意向や状況に先回りで配慮すること。\n③ 他人の気持ちや背後の意図を推測して行動を決めること。", 
            example: "部下たちは、社長の顔色を見て忖度した提案ばかりをするようになった。" 
        },
        "完璧": { 
            reading: "かんぺき", 
            meaning: "① 欠点が全く存在せず、非の打ち所がない極めて優れた状態。\n② 計画や成果物が当初の目標や仕様を完全に満たしている様子。\n③ 完璧を象徴する語源として「キズ一つない高価な宝の玉(璧)」を持ち帰ること。", 
            example: "何度もリハーサルを重ねたおかげで、本番は完璧なステージになった。" 
        },
        "蔓延": { 
            reading: "まんえん", 
            meaning: "① 感染症や好ましくない習慣、思想などが社会全体に広く伝播すること。\n② 植物のつるが四方に伸び広がるように、勢いが止まらずに拡散すること。\n③ 望ましくない事態が制御困難な規模で全域に行き渡ること。", 
            example: "冬場にかけて、乾燥した空気の中でインフルエンザが蔓延し始めた。" 
        },
        "破綻": { 
            reading: "はたん", 
            meaning: "① 財政面や資金繰りが行き詰まり、事業や生活の維持ができなくなること。\n② 構築してきた人間関係や夫婦関係、交渉内容が完全に壊れること。\n③ 衣服や布地が破れ裂けること（語源）。", 
            example: "無理な投資プランがたたり、ついに個人の家計が破綻した。" 
        },
        "乖離": { 
            reading: "かいり",

    function updateSwipePosition() {

    // iPhoneホーム画面風：スワイプ（Drag）追従イベントリスナー
    swipeContainer.addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
        isScrolling = undefined; // 判定リセット
        swipeWrapper.style.transition = 'none'; // ドラッグ中はトランジションを切って追従
    }, {passive: true});

    swipeContainer.addEventListener('touchmove', e => {
        if (isScrolling === true) return; // 縦スクロール判定時はスライド処理を無視

        const touchX = e.touches[0].clientX;
        const touchY = e.touches[0].clientY;
        const diffX = touchX - touchStartX;
        const diffY = touchY - touchStartY;

        // 最初の微小移動で縦か横かを判定
        if (isScrolling === undefined) {
            if (Math.abs(diffY) > Math.abs(diffX)) {
                isScrolling = true; // 縦スクロールと見なす
                return;
            } else {
                isScrolling = false; // 横スワイプと見なす
            }
        }

        // 横スワイプ確定時は画面のデフォルトスクロール（バウンス等）をブロック
        if (e.cancelable) e.preventDefault();

        // 追従量の計算
        const containerWidth = swipeContainer.offsetWidth;
        let dragPercent = (diffX / containerWidth) * 100;

        // 端での抵抗（バウンス感）を追加
        if (currentTabIndex === 0 && diffX > 0) {
            dragPercent = dragPercent * 0.35; // 右にこれ以上進まないときの引っ張り感
        } else if (currentTabIndex === 1 && diffX < 0) {
            dragPercent = dragPercent * 0.35; // 左にこれ以上進まないときの引っ張り感
        }

        const baseTranslate = currentTabIndex * -50;
        // wrapperは全体で200%幅なので、diffXのパーセンテージを半減（50%スケール）して適用
        const finalTranslate = baseTranslate + (dragPercent * 0.5);
        swipeWrapper.style.transform = `translateX(${finalTranslate}%)`;
    }, {passive: false}); // cancelableを有効化するためにpassiveをfalseにする

    swipeContainer.addEventListener('touchend', e => {
        if (isScrolling === true) return;

        const touchEndX = e.changedTouches[0].clientX;
        const diffX = touchEndX - touchStartX;
        const containerWidth = swipeContainer.offsetWidth;
        const dragPercent = (diffX / containerWidth) * 100;

        // 18%以上スワイプしたら、切り替え決定
        const swipeThreshold = 18;

        if (dragPercent < -swipeThreshold && currentTabIndex === 0) {
            currentTabIndex = 1; // 一覧へ
        } else if (dragPercent > swipeThreshold && currentTabIndex === 1) {
            currentTabIndex = 0; // クイズへ
        }

        // 吸い付くようななめらかスナップ
        updateSwipePosition();
    }, {passive: true});

    // Wikipediaなどの文脈から「その漢字を含む日本語文」を賢く探し出すロジック
    async function fetchKanjiInfoAutomatically() {
        const kanji = document.getElementById('form-kanji').value.trim();
        if (!kanji) return;

        // 手動ですべて埋まっている場合は邪魔しない
        const currentReading = document.getElementById('form-reading').value.trim();
        const currentMeaning = document.getElementById('form-meaning').value.trim();
        if (currentReading && currentMeaning) return;

        const loader = document.getElementById('loading-indicator');
        loader.style.display = 'flex';

        // 1. まず超高速オフライン辞書を確認
        if (offlineDict[kanji]) {
            fillForm(offlineDict[kanji].reading, offlineDict[kanji].meaning, offlineDict[kanji].example);
            loader.style.display = 'none';
            showToast(`「${kanji}」の情報を高速取得したで！`);
            return;
        }

        try {
            // 2. Wikipedia 日本語 REST API
            const wikiUrl = `https://ja.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(kanji)}`;
            const wikiRes = await fetch(wikiUrl);
            
            if (wikiRes.ok) {
                const wikiData = await wikiRes.json();
                const extract = wikiData.extract || "";

                if (extract) {
                    // 読み方の抽出（カッコ内のひらがな）
                    const readingMatch = extract.match(/(?:（|\()([ぁ-んァ-ヶー]+)(?:）|\))/);
                    let reading = readingMatch ? readingMatch[1] : '';

                    let meaningRaw = extract;
                    const definitionMatch = extract.match(/(?:とは、|は、|とは)(.+)/);
                    if (definitionMatch) {
                        meaningRaw = definitionMatch[1];
                    }
                    
                    // 3個以上の詳細な意味を抽出・整形
                    const sentences = meaningRaw.split('。').filter(s => s.trim().length > 0);
                    let meaningStr = "";
                    
                    if (sentences.length >= 3) {
                        meaningStr = `① ${sentences[0]}。\n② ${sentences[1]}。\n③ ${sentences[2]}。`;
                    } else if (sentences.length === 2) {
                        meaningStr = `① ${sentences[0]}。\n② ${sentences[1]}。\n③ 「${kanji}」に関連する一般的な解説や語源。`;
                    } else {
                        meaningStr = `① ${sentences[0]}。\n② 辞書検索に基づく主な日本語表現。\n③ ビジネス・ニュース等での標準的な使い勝手。`;
                    }

                    // 【核心】解説文の中からその「漢字」が使われている実際の文章を「例文」として検索・ひっぱり出す！
                    let foundExample = "";
                    for (let sentence of sentences) {
                        sentence = sentence.trim();
                        // 「とは」などの定義を説明する文は避け、その漢字を含んでいる自然な一文をひき肉のように切り出す
                        if (sentence.includes(kanji) && !sentence.includes("とは") && sentence.length > 5 && sentence.length < 55) {
                            foundExample = sentence + "。";
                            break;
                        }
                    }

                    // 見つからなければ漢字が含まれる文章なら何でも引っ張る
                    if (!foundExample) {
                        for (let sentence of sentences) {
                            sentence = sentence.trim();
                            if (sentence.includes(kanji) && sentence.length > 5 && sentence.length < 65) {
                                foundExample = sentence + "。";
                                break;
                            }
                        }
                    }

                    // それでも見つからない場合の自然なフォールバック
                    if (!foundExample) {
                        foundExample = `実社会において、「${kanji}」は非常に重要な役割を果たしています。`;
                    }

                    // 読みがまだ空なら別APIから読みをバックアップ
                    if (!reading) {
                        const jishoReading = await fetchReadingFromJisho(kanji);
                        if (jishoReading) reading = jishoReading;
                    }

                    fillForm(reading, meaningStr, foundExample);
                    loader.style.display = 'none';
                    showToast(`「${kanji}」の情報を自動取得・例文検索成功！`);
                    return;
                }
            }

            // 3. Jisho API (最終バックアップ)
            const jishoBackup = await fetchFromJishoAll(kanji);
            if (jishoBackup) {
                fillForm(jishoBackup.reading, jishoBackup.meaning, `日常生活や文脈において、「${kanji}」は広く応用されています。`);
                showToast(`「${kanji}」のデータを取得！`);
            } else {
                showToast("見つかりませんでした。手動で入力してください！");
            }

        } catch (error) {
            console.error("API Error: ", error);
        } finally {
            loader.style.display = 'none';
        }
    }

    async function fetchReadingFromJisho(word) {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://jisho.org/api/v1/search/words?keyword=' + word)}`);
            const json = await res.json();
            const jishoData = JSON.parse(json.contents);
            if (jishoData && jishoData.data && jishoData.data.length > 0) {
                return jishoData.data[0].japanese[0].reading || '';
            }
        } catch (e) { console.error(e); }
        return '';
    }

    async function fetchFromJishoAll(word) {
        try {
            const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://jisho.org/api/v1/search/words?keyword=' + word)}`);
            const json = await res.json();
            const jishoData = JSON.parse(json.contents);
            if (jishoData && jishoData.data && jishoData.data.length > 0) {
                const entry = jishoData.data[0];
                const reading = entry.japanese[0].reading || '';
                const senses = entry.senses.slice(0, 3);
                
                let meaningText = "";
                senses.forEach((sense, index) => {
                    meaningText += `${String.fromCharCode(9312 + index)} (${sense.parts_of_speech.join(', ')}) ${sense.english_definitions.join(', ')}\n`;
                });
                
                if (senses.length < 3) {
                    meaningText += `② 英語表現：${senses[0] ? senses[0].english_definitions.join(', ') : 'No data'}\n③ 用語集に基づく一般的な語。`;
                }

                return { reading, meaning: meaningText };
            }
        } catch (e) { console.error(e); }
        return null;
    }

    function formatMeaning(meaningText) {
        if (!meaningText) return '';
        const lines = meaningText.split('\n');
        let html = '<ul class="meaning-list">';
        lines.forEach(line => {
            if (line.trim().length > 0) {
                html += `<li>${line}</li>`;
            }
        });
        html += '</ul>';
        return html;
    }

        if (!isOpen) {

                        <h2>漢字テストに挑戦</h2>
                        <p>覚えていない漢字が <strong>${activeQuizCards.length} 語</strong> あるよ！</p>
                        <button class="btn btn-primary" onclick="startQuizNow()" style="width:auto; padding: 14px 30px;"><i class="fa-solid fa-play"></i> テストを始める</button>
                    </div>
                `;
            }
        } else if (quizState === 'active') {
            renderActiveQuizCard();
        }
    }

    function startQuizNow() {
        quizState = 'active';
        currentQuizIndex = 0;
        renderQuiz();
    }

    function renderActiveQuizCard() {
        const container = document.getElementById('quiz-container');
        const currentCard = activeQuizCards[currentQuizIndex];
        
        const total = activeQuizCards.length;
        const progressPercentage = ((currentQuizIndex) / total) * 100;

        container.innerHTML = `
            <div style="display:flex; justify-content:space-between; color:var(--text-sub); font-size:0.75rem; margin-bottom:6px; font-weight:bold;">
                <span>問題: ${currentQuizIndex + 1} / ${total} 語目</span>
                <span style="color:#d35400;"><i class="fa-solid fa-hourglass-half"></i> 未マスター: ${total} 語</span>
            </div>

            <!-- 進捗バー -->
            <div class="progress-container">
                <div class="progress-bar" style="width: ${progressPercentage}%"></div>
            </div>
            
            <!-- 漢字表示部 -->
            <div class="quiz-kanji-container">
                <div class="quiz-kanji">${currentCard.kanji}</div>
            </div>
            
            <!-- 答えを見るボタン（スクロール不要。親指の位置に固定出現） -->
            <button id="show-answer-btn" class="btn btn-primary" onclick="showQuizAnswer()"><i class="fa-solid fa-eye"></i> 答えを見る</button>
            
            <!-- 漢字の真下に完全集約される答えグループ -->
            <div id="quiz-details" class="quiz-details">
                <div class="detail-group">
                    <div class="label"><i class="fa-solid fa-microphone"></i> 読み</div>
                    <div class="value reading-highlight">${currentCard.reading}</div>
                </div>
                <div class="detail-group">
                    <div class="label"><i class="fa-solid fa-book"></i> 意味</div>
                    <div class="value">${formatMeaning(currentCard.meaning)}</div>
                </div>
                <div class="detail-group">
                    <div class="label"><i class="fa-solid fa-pen-nib"></i> 例文</div>
                    <div class="value" style="font-style: italic; color:#4a5568; font-size:0.8rem;">${currentCard.example}</div>
                </div>
            </div>

            <!-- 覚えた・まだ アクションボタン。答えを見るのと同じ領域に出現するから親指1ミリも動かさなくてOK -->
            <div id="quiz-actions" class="quiz-actions">
                <button class="btn btn-success" onclick="submitQuizResult(true)"><i class="fa-solid fa-check"></i> 覚えた！</button>
                <button class="btn btn-secondary" onclick="submitQuizResult(false)"><i class="fa-solid fa-rotate-right"></i> まだ…</button>
            </div>
        `;
    }

    function showQuizAnswer() {
        document.getElementById('show-answer-btn').style.display = 'none';
        document.getElementById('quiz-details').style.display = 'block';
        document.getElementById('quiz-actions').style.display = 'flex';
    }

    function submitQuizResult(isMastered) {
        const currentCard = activeQuizCards[currentQuizIndex];

        if (isMastered) {
            kanjiData = kanjiData.map(item => item.id === currentCard.id ? {...item, isMastered: true} : item);
            saveToStorage();
            activeQuizCards.splice(currentQuizIndex, 1);
            showToast(`「${currentCard.kanji}」を覚えたよ！`);
        } else {
            currentQuizIndex++;
        }

        // インデックスループ
        if (currentQuizIndex >= activeQuizCards.length) {
            currentQuizIndex = 0;
        }

        if (activeQuizCards.length === 0) {
            quizState = 'start';
        }

        renderQuiz();
    }

    // 初回アプリの立ち上げ
    initQuiz();
</script>

</body>
</html>
